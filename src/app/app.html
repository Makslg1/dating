<audio id="bg-music" src="music.mp3" loop preload="none"></audio>

<div class="hearts" aria-hidden="true">
  <span>♥</span><span>♥</span><span>♥</span><span>♥</span><span>♥</span><span>♥</span><span>♥</span>
</div>

<button class="music-btn" (click)="toggleMusic()" [attr.aria-label]="musicOn() ? 'Выключить музыку' : 'Включить музыку'">
  {{ musicOn() ? '🎵' : '🔇' }}
</button>

<nav class="steps" aria-label="Прогресс">
  <div class="steps-track"><div class="steps-fill" [style.width.%]="progress()"></div></div>
  <ol class="steps-list">
    @for (s of steps; track s.key; let i = $index) {
      <li class="step" [class.done]="i < stepIndex()" [class.active]="i === stepIndex()">
        <span class="dot">
          @if (i === steps.length - 1) { <span class="dot-heart">♥</span> }
        </span>
        <span class="label">{{ s.label }}</span>
      </li>
    }
  </ol>
</nav>

<main class="stage">
  <div class="card">
    @switch (state.step()) {
      @case ('ask') { <app-ask /> }
      @case ('when') { <app-when /> }
      @case ('what') { <app-what /> }
      @case ('done') { <app-done /> }
    }

    <footer class="contacts-bar">
      <span class="contacts-label">Мои контакты:</span>
      <a class="contact vk" href="https://vk.com/mr_maksim_maltsev" target="_blank" rel="noopener">VK</a>
      <a class="contact tg" href="https://t.me/bigmax555" target="_blank" rel="noopener">Telegram</a>
    </footer>
  </div>
</main>
