<audio id="bg-music" src="music.mp3" loop preload="none"></audio>

<button class="music-btn" (click)="toggleMusic()" [attr.aria-label]="muted() ? 'Включить музыку' : 'Выключить музыку'">
  {{ muted() ? '🔈' : '🎵' }}
</button>

<div class="beam" aria-hidden="true">
  <div class="beam-track"></div>
  <div class="beam-figure" [style.left.%]="progress()">🤸‍♀️</div>
</div>

<main class="stage">
  <div class="card">
    @switch (state.step()) {
      @case ('ask') { <app-ask /> }
      @case ('when') { <app-when /> }
      @case ('what') { <app-what /> }
      @case ('done') { <app-done /> }
    }
  </div>
</main>
