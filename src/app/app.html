<audio id="bg-music" src="music.mp3" loop preload="none"></audio>

<button class="music-btn" (click)="toggleMusic()" [attr.aria-label]="musicOn() ? 'Выключить музыку' : 'Включить музыку'">
  {{ musicOn() ? '🎵' : '🔇' }}
</button>

<div class="beam" aria-hidden="true">
  <div class="beam-track"></div>
  <div class="beam-figure" [style.left.%]="progress()">🤸‍♀️</div>
</div>

<main class="stage">
  <div class="card">
    @switch (state.step()) {
      @case ('ask') { <app-ask /> }
      @case ('when') { <app-when /> }
      @case ('what') { <app-what /> }
      @case ('done') { <app-done /> }
    }

    <footer class="contacts-bar">
      <span class="contacts-label">Мои контакты:</span>
      <a class="contact vk" href="https://vk.com/mr_maksim_maltsev" target="_blank" rel="noopener">VK</a>
      <a class="contact tg" href="https://t.me/bigmax555" target="_blank" rel="noopener">Telegram</a>
    </footer>
  </div>
</main>
